name: Production Job

on:
  push:
    branches:
      - main

jobs:
  dbt_build:
    name: dbt Build Production
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -q dbt-postgres datafold-sdk

      - name: Create profiles.yml
        run: |
          cat > profiles.yml <<EOF
          default:
            target: prod
            outputs:
              prod:
                type: postgres
                host: ${{ secrets.POSTGRES_HOST }}
                port: ${{ secrets.POSTGRES_PORT }}
                user: ${{ secrets.POSTGRES_USER }}
                password: ${{ secrets.POSTGRES_PASSWORD }}
                dbname: ${{ secrets.POSTGRES_DB }}
                schema: public
                threads: 4
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: Seed data
        run: dbt seed --full-refresh --vars '{"load_source_data": true}'

      - name: Build dbt project
        run: dbt build

      - name: Upload artifacts to Datafold
        run: |
          datafold dbt upload \
            --ci-config-id ${{ secrets.DATAFOLD_CI_CONFIG_ID }} \
            --run-type production \
            --commit-sha ${GITHUB_SHA}
        env:
          DATAFOLD_API_KEY: ${{ secrets.DATAFOLD_API_KEY }}
